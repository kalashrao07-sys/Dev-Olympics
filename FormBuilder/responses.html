<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Responses — FormCraft</title>
<script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.0"></script>
<script src="js/appwrite.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
  *{font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
  .grad{background:linear-gradient(135deg,#7c3aed,#2563eb)}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  .fade-up{animation:fadeUp .4s ease both}
  ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}
  .resp-card{animation:fadeUp .35s ease both}
</style>
</head>
<body class="bg-slate-950 text-white min-h-screen">
<div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2 pointer-events-none"></div>

<!-- Header -->
<header class="sticky top-0 z-20 border-b border-slate-800 bg-slate-950/90 backdrop-blur-xl">
  <div class="max-w-5xl mx-auto px-4 sm:px-6 py-3 flex items-center justify-between gap-4">
    <div class="flex items-center gap-3 min-w-0">
      <a href="index.html" class="text-slate-500 hover:text-white transition-colors flex-shrink-0">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      </a>
      <div class="w-px h-5 bg-slate-800 flex-shrink-0"></div>
      <div>
        <h1 id="page-title" class="text-sm font-semibold text-white truncate">Responses</h1>
        <p id="resp-count" class="text-xs text-slate-500"></p>
      </div>
    </div>
    <div class="flex items-center gap-2 flex-shrink-0">
      <button id="btn-export-all" class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs text-slate-400 hover:text-white bg-slate-800 border border-slate-700 transition-all">
        ⬇ Export All
      </button>
    </div>
  </div>
</header>

<!-- Filters -->
<div class="max-w-5xl mx-auto px-4 sm:px-6 pt-6 pb-3">
  <div class="flex flex-wrap gap-3 items-center">
    <input id="search-input" type="text" placeholder="Search responses…"
      class="bg-slate-800 border border-slate-700 rounded-xl px-4 py-2 text-sm text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-violet-500 w-full sm:w-72 transition-all"/>
    <span id="filter-info" class="text-xs text-slate-500"></span>
  </div>
</div>

<!-- Content -->
<main class="max-w-5xl mx-auto px-4 sm:px-6 py-4 pb-16">
  <!-- Loading -->
  <div id="st-loading" class="text-center py-24">
    <div style="width:36px;height:36px;border:3px solid #1e293b;border-top-color:#7c3aed;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px"></div>
    <p class="text-slate-500 text-sm">Loading responses…</p>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
  </div>

  <!-- Empty -->
  <div id="st-empty" class="hidden text-center py-24">
    <div class="w-16 h-16 rounded-2xl bg-slate-800 border border-slate-700 flex items-center justify-center mx-auto mb-4">
      <svg class="w-7 h-7 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/></svg>
    </div>
    <p class="text-slate-400 font-medium mb-1">No responses yet</p>
    <p class="text-slate-600 text-sm">Share the form link to start collecting responses.</p>
  </div>

  <!-- Error -->
  <div id="st-error" class="hidden text-center py-16 bg-rose-500/5 border border-rose-500/15 rounded-2xl">
    <p class="text-rose-400 font-medium mb-2">⚠ Could not load from Appwrite</p>
    <p id="st-error-msg" class="text-slate-500 text-sm">Showing locally cached responses below.</p>
  </div>

  <!-- Responses list -->
  <div id="resp-list" class="space-y-3 mt-4"></div>
</main>

<script src="js/storage.js"></script><script src="js/app.js"></script>
<script>
const params  = new URLSearchParams(location.search);
const formId  = params.get('id');
let allResponses = [];
let schema = null;

// Auth guard
const _userId = localStorage.getItem('userId');
if (!_userId) location.href = 'login.html';

(async function init() {
  if (!formId) { showState('error', 'No form ID in URL.'); return; }

  // Load form schema for context (title, field names)
  schema = loadFormById(formId);
  if (schema) {
    document.title = `Responses — ${schema.title}`;
    document.getElementById('page-title').textContent = schema.title + ' — Responses';
  }

  // Try Appwrite first
  let remote = null;
  try { remote = await getResponsesFromAppwrite(formId); } catch {}

  if (remote !== null) {
    allResponses = remote;
  } else {
    // Fallback to localStorage
    document.getElementById('st-error').classList.remove('hidden');
    allResponses = (getResponses(formId) || []).map(r => ({
      id: r.id, createdAt: r.submittedAt, data: r.data,
    }));
  }

  document.getElementById('resp-count').textContent = `${allResponses.length} response${allResponses.length !== 1 ? 's' : ''}`;
  renderList(allResponses);
  showState(allResponses.length ? 'list' : 'empty');

  // Search / filter
  document.getElementById('search-input').addEventListener('input', function() {
    const q = this.value.toLowerCase().trim();
    if (!q) { renderList(allResponses); updateFilterInfo(allResponses.length, allResponses.length); return; }
    const filtered = allResponses.filter(r => {
      const flat = Object.entries(r.data || {}).map(([k,v]) => `${k} ${v}`).join(' ').toLowerCase();
      return flat.includes(q);
    });
    renderList(filtered);
    updateFilterInfo(filtered.length, allResponses.length);
  });

  // Export all
  document.getElementById('btn-export-all').addEventListener('click', () => {
    if (!allResponses.length) { showToast('No responses to export', 'warning'); return; }
    const blob = new Blob([JSON.stringify(allResponses, null, 2)], { type: 'application/json' });
    const a = Object.assign(document.createElement('a'), {
      href: URL.createObjectURL(blob), download: `${formId}_responses.json`
    });
    a.click(); URL.revokeObjectURL(a.href);
    showToast('Responses exported!');
  });
})();

function showState(s, errMsg) {
  document.getElementById('st-loading').classList.toggle('hidden', s !== 'loading');
  document.getElementById('st-empty').classList.toggle('hidden', s !== 'empty');
  if (errMsg) document.getElementById('st-error-msg').textContent = errMsg;
}

function updateFilterInfo(shown, total) {
  const el = document.getElementById('filter-info');
  el.textContent = shown < total ? `Showing ${shown} of ${total}` : '';
}

function renderList(responses) {
  const el = document.getElementById('resp-list');
  if (!responses.length) { el.innerHTML = ''; return; }

  el.innerHTML = responses.map((r, i) => {
    const entries = Object.entries(r.data || {});
    const dateStr = r.createdAt ? new Date(r.createdAt).toLocaleString() : '—';
    return `
    <div class="resp-card bg-slate-900 border border-slate-800 rounded-2xl p-5" style="animation-delay:${i * 0.03}s">
      <div class="flex items-center justify-between mb-4 gap-3">
        <div class="flex items-center gap-2">
          <div class="w-7 h-7 rounded-lg grad flex items-center justify-center text-white text-xs font-bold flex-shrink-0">${i + 1}</div>
          <span class="text-xs text-slate-500">${sanitize(dateStr)}</span>
        </div>
        <button onclick="exportSingle(${i})" class="text-xs text-slate-600 hover:text-violet-400 transition-colors flex-shrink-0">⬇ Export</button>
      </div>
      <div class="space-y-2">
        ${entries.length ? entries.map(([k, v]) => `
          <div class="flex items-start justify-between gap-4 py-2 border-b border-slate-800/80 last:border-0">
            <span class="text-xs text-slate-500 font-medium min-w-0 truncate">${sanitize(k)}</span>
            <span class="text-sm text-white font-medium text-right max-w-xs break-words">${sanitize(String(v))}</span>
          </div>`).join('') : '<p class="text-xs text-slate-600">Empty response</p>'}
      </div>
    </div>`;
  }).join('');
}

function exportSingle(idx) {
  const r = allResponses[idx];
  if (!r) return;
  const blob = new Blob([JSON.stringify(r, null, 2)], { type: 'application/json' });
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(blob), download: `response_${idx + 1}.json`
  });
  a.click(); URL.revokeObjectURL(a.href);
}
</script>
</body>
</html>
