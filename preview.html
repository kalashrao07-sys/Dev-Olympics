<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Preview — FormCraft</title>
<script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.0"></script>
<script src="js/appwrite.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
  *{font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
  .grad{background:linear-gradient(135deg,#7c3aed,#2563eb)}
  .preview-field{transition:opacity .3s,height .3s,margin .3s}
  ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:#0f172a}::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}
</style>
</head>
<body class="bg-slate-950 text-white min-h-screen">
<div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2 pointer-events-none"></div>

<header class="border-b border-slate-800 sticky top-0 z-20 bg-slate-950/90 backdrop-blur-xl">
  <div class="max-w-6xl mx-auto px-4 sm:px-6 py-3 flex items-center justify-between gap-3">
    <div class="flex items-center gap-3 min-w-0">
      <a href="index.html" class="text-slate-500 hover:text-white transition-colors flex-shrink-0">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      </a>
      <div class="w-px h-5 bg-slate-800"></div>
      <span class="text-sm font-semibold truncate">FormCraft Preview</span>
      <span class="hidden sm:flex items-center gap-1.5 bg-amber-500/10 border border-amber-500/25 rounded-lg px-2.5 py-1 text-xs text-amber-300 font-medium flex-shrink-0">
        <span class="w-1.5 h-1.5 rounded-full bg-amber-400 animate-pulse"></span>Preview Mode
      </span>
    </div>
    <div class="flex items-center gap-2 flex-shrink-0">
      <button id="btn-reset" class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs text-slate-400 hover:text-white bg-slate-800 border border-slate-700 transition-all">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
        Reset
      </button>
      <button id="public-link" class="flex items-center gap-1.5 bg-emerald-600 hover:bg-emerald-500 text-white px-3 py-1.5 rounded-lg text-xs font-semibold transition-colors">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
        Open Form
      </button>
      <a id="edit-link" href="builder.html" class="flex items-center gap-1.5 grad text-white px-3 py-1.5 rounded-lg text-xs font-semibold hover:opacity-90 transition-opacity">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
        Edit
      </a>
    </div>
  </div>
</header>

<div id="preview-area" class="max-w-6xl mx-auto px-4 sm:px-6 py-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
  <!-- Form -->
  <div class="lg:col-span-2">
    <div class="bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden">
      <div class="bg-gradient-to-br from-violet-600/15 to-blue-600/15 border-b border-slate-800 p-8">
        <h1 id="preview-title" class="text-xl font-bold text-white mb-1.5"></h1>
        <p id="preview-desc" class="text-sm text-slate-400"></p>
      </div>
      <div id="preview-fields" class="p-8 min-h-32"></div>
    </div>
  </div>

  <!-- Sidebar -->
  <div class="space-y-4">
    <div class="bg-slate-900 border border-slate-800 rounded-2xl p-5">
      <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-4 flex items-center gap-2">
        <span class="text-violet-400">⚡</span> Logic Rules
      </h3>
      <div id="logic-inspector"><p class="text-xs text-slate-600">Interact with the form to see rules activate.</p></div>
    </div>
    <div class="bg-slate-900 border border-slate-800 rounded-2xl p-5">
      <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-4 flex items-center gap-2">
        <span class="text-blue-400">⊡</span> Live Values
      </h3>
      <div id="live-values"><p class="text-xs text-slate-600">No values yet.</p></div>
    </div>
  </div>
</div>

<script src="js/storage.js"></script><script src="js/app.js"></script><script src="js/logic.js"></script><script src="js/preview.js"></script>
</body></html>
