<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FormCraft — Logic-Driven Form Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white min-h-screen">

    <!-- NAVBAR -->
    <nav class="bg-gray-900 border-b border-gray-800 px-8 py-4 
    flex justify-between items-center">
        <h1 class="text-xl font-bold text-blue-400">⚡ FormCraft</h1>
        <span class="text-gray-400 text-sm">Logic-Driven Form Builder</span>
    </nav>

    <main class="max-w-2xl mx-auto px-6 py-10">

        <!-- PROGRESS BAR -->
        <div class="mb-8">
            <div class="flex justify-between text-sm text-gray-400 mb-2">
                <span>Step <span id="currentStep">1</span> of 3</span>
                <span id="progressText">33%</span>
            </div>
            <div class="w-full bg-gray-800 rounded-full h-2">
                <div id="progressBar" 
                class="bg-blue-500 h-2 rounded-full transition-all duration-500" 
                style="width: 33%"></div>
            </div>
        </div>

        <!-- STEP 1 -->
        <div id="step1" class="bg-gray-900 border border-gray-800 
        rounded-xl p-8">
            <h2 class="text-2xl font-bold mb-1">Tell us about yourself</h2>
            <p class="text-gray-400 mb-6 text-sm">Basic information</p>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-300 mb-1">
                    Full Name *</label>
                    <input id="name" type="text" placeholder="Enter your name"
                    class="w-full bg-gray-800 border border-gray-700 rounded-lg 
                    px-4 py-3 text-white placeholder-gray-500 focus:outline-none 
                    focus:border-blue-500 transition"/>
                </div>

                <div>
                    <label class="block text-sm text-gray-300 mb-1">
                    Email *</label>
                    <input id="email" type="email" placeholder="Enter your email"
                    class="w-full bg-gray-800 border border-gray-700 rounded-lg 
                    px-4 py-3 text-white placeholder-gray-500 focus:outline-none 
                    focus:border-blue-500 transition"/>
                </div>

                <div>
                    <label class="block text-sm text-gray-300 mb-1">
                    I am a *</label>
                    <select id="userType" onchange="handleUserType()"
                    class="w-full bg-gray-800 border border-gray-700 rounded-lg 
                    px-4 py-3 text-white focus:outline-none focus:border-blue-500 
                    transition">
                        <option value="">Select type</option>
                        <option value="student">Student</option>
                        <option value="professional">Professional</option>
                    </select>
                </div>
            </div>

            <div id="errorMsg1" class="text-red-400 text-sm mt-3 hidden"></div>

            <button onclick="goToStep2()" 
            class="mt-6 w-full bg-blue-600 hover:bg-blue-500 text-white 
            font-semibold py-3 rounded-lg transition">
                Next →
            </button>
        </div>

        <!-- STEP 2 (conditional) -->
        <div id="step2" class="hidden bg-gray-900 border border-gray-800 
        rounded-xl p-8">
            <h2 class="text-2xl font-bold mb-1" id="step2Title">
            More Details</h2>
            <p class="text-gray-400 mb-6 text-sm">Based on your profile</p>

            <!-- Student fields -->
            <div id="studentFields" class="space-y-4 hidden">
                <div>
                    <label class="block text-sm text-gray-300 mb-1">
                    College Name *</label>
                    <input id="college" type="text" placeholder="Your college"
                    class="w-full bg-gray-800 border border-gray-700 rounded-lg 
                    px-4 py-3 text-white placeholder-gray-500 focus:outline-none 
                    focus:border-blue-500 transition"/>
                </div>
                <div>
                    <label class="block text-sm text-gray-300 mb-1">
                    Year of Study *</label>
                    <select id="year"
                    class="w-full bg-gray-800 border border-gray-700 rounded-lg 
                    px-4 py-3 text-white focus:outline-none focus:border-blue-500 
                    transition">
                        <option value="">Select year</option>
                        <option>1st Year</option>
                        <option>2nd Year</option>
                        <option>3rd Year</option>
                        <option>4th Year</option>
                    </select>
                </div>
            </div>

            <!-- Professional fields -->
            <div id="professionalFields" class="space-y-4 hidden">
                <div>
                    <label class="block text-sm text-gray-300 mb-1">
                    Company Name *</label>
                    <input id="company" type="text" placeholder="Your company"
                    class="w-full bg-gray-800 border border-gray-700 rounded-lg 
                    px-4 py-3 text-white placeholder-gray-500 focus:outline-none 
                    focus:border-blue-500 transition"/>
                </div>
                <div>
                    <label class="block text-sm text-gray-300 mb-1">
                    Years of Experience *</label>
                    <select id="experience"
                    class="w-full bg-gray-800 border border-gray-700 rounded-lg 
                    px-4 py-3 text-white focus:outline-none focus:border-blue-500 
                    transition">
                        <option value="">Select experience</option>
                        <option>0-1 years</option>
                        <option>1-3 years</option>
                        <option>3-5 years</option>
                        <option>5+ years</option>
                    </select>
                </div>
            </div>

            <div id="errorMsg2" class="text-red-400 text-sm mt-3 hidden"></div>

            <div class="flex gap-3 mt-6">
                <button onclick="goToStep(1)"
                class="w-1/3 bg-gray-700 hover:bg-gray-600 text-white 
                font-semibold py-3 rounded-lg transition">
                    ← Back
                </button>
                <button onclick="goToStep3()"
                class="w-2/3 bg-blue-600 hover:bg-blue-500 text-white 
                font-semibold py-3 rounded-lg transition">
                    Next →
                </button>
            </div>
        </div>

        <!-- STEP 3 — Summary -->
        <div id="step3" class="hidden bg-gray-900 border border-gray-800 
        rounded-xl p-8">
            <h2 class="text-2xl font-bold mb-1">Review & Submit</h2>
            <p class="text-gray-400 mb-6 text-sm">Confirm your details</p>

            <div id="summary" class="space-y-3 mb-6"></div>

            <div class="flex gap-3">
                <button onclick="goToStep(2)"
                class="w-1/3 bg-gray-700 hover:bg-gray-600 text-white 
                font-semibold py-3 rounded-lg transition">
                    ← Back
                </button>
                <button onclick="submitForm()"
                class="w-2/3 bg-green-600 hover:bg-green-500 text-white 
                font-semibold py-3 rounded-lg transition">
                    ✓ Submit
                </button>
            </div>
        </div>

        <!-- SUCCESS -->
        <div id="successScreen" class="hidden bg-gray-900 border 
        border-green-800 rounded-xl p-8 text-center">
            <div class="text-5xl mb-4">🎉</div>
            <h2 class="text-2xl font-bold text-green-400 mb-2">
            Submitted!</h2>
            <p class="text-gray-400 mb-6">Your response has been recorded.</p>
            <button onclick="resetForm()"
            class="bg-blue-600 hover:bg-blue-500 text-white font-semibold 
            px-8 py-3 rounded-lg transition">
                Start Over
            </button>
        </div>

    </main>

    <script>
        let userData = {};

        function handleUserType() {
            const type = document.getElementById('userType').value;
            const student = document.getElementById('studentFields');
            const prof = document.getElementById('professionalFields');
            if (type === 'student') {
                student.classList.remove('hidden');
                prof.classList.add('hidden');
            } else if (type === 'professional') {
                prof.classList.remove('hidden');
                student.classList.add('hidden');
            }
        }

        function showError(id, msg) {
            const el = document.getElementById(id);
            el.textContent = msg;
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 3000);
        }

        function goToStep2() {
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const type = document.getElementById('userType').value;

            if (!name) return showError('errorMsg1', 'Please enter your name');
            if (!email || !email.includes('@')) 
                return showError('errorMsg1', 'Please enter a valid email');
            if (!type) 
                return showError('errorMsg1', 'Please select your type');

            userData.name = name;
            userData.email = email;
            userData.type = type;

            goToStep(2);
        }

        function goToStep3() {
            const type = userData.type;
            if (type === 'student') {
                const college = document.getElementById('college').value.trim();
                const year = document.getElementById('year').value;
                if (!college) 
                    return showError('errorMsg2', 'Please enter college name');
                if (!year) 
                    return showError('errorMsg2', 'Please select year');
                userData.college = college;
                userData.year = year;
            } else {
                const company = document.getElementById('company').value.trim();
                const exp = document.getElementById('experience').value;
                if (!company) 
                    return showError('errorMsg2', 'Please enter company name');
                if (!exp) 
                    return showError('errorMsg2', 'Please select experience');
                userData.company = company;
                userData.experience = exp;
            }

            // Build summary
            let html = '';
            const fields = {
                'Name': userData.name,
                'Email': userData.email,
                'Type': userData.type === 'student' ? 'Student' : 'Professional',
                ...(userData.type === 'student' 
                    ? {'College': userData.college, 'Year': userData.year}
                    : {'Company': userData.company, 
                       'Experience': userData.experience})
            };

            for (const [key, val] of Object.entries(fields)) {
                html += `
                <div class="flex justify-between items-center bg-gray-800 
                rounded-lg px-4 py-3">
                    <span class="text-gray-400 text-sm">${key}</span>
                    <span class="text-white font-medium">${val}</span>
                </div>`;
            }
            document.getElementById('summary').innerHTML = html;
            goToStep(3);
        }

        function goToStep(n) {
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('step3').classList.add('hidden');
            document.getElementById(`step${n}`).classList.remove('hidden');
            document.getElementById('currentStep').textContent = n;
            const pct = Math.round((n / 3) * 100) + '%';
            document.getElementById('progressBar').style.width = pct;
            document.getElementById('progressText').textContent = pct;
        }

        function submitForm() {
            document.getElementById('step3').classList.add('hidden');
            document.getElementById('progressBar').style.width = '100%';
            document.getElementById('progressText').textContent = '100%';
            document.getElementById('successScreen').classList.remove('hidden');
        }

        function resetForm() {
            userData = {};
            document.getElementById('name').value = '';
            document.getElementById('email').value = '';
            document.getElementById('userType').value = '';
            document.getElementById('college').value = '';
            document.getElementById('company').value = '';
            document.getElementById('studentFields').classList.add('hidden');
            document.getElementById('professionalFields').classList.add('hidden');
            document.getElementById('successScreen').classList.add('hidden');
            goToStep(1);
        }
    </script>
</body>
</html>
